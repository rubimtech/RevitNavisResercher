server {
    listen 80;
    server_name d9e0f9d73f7a.vps.myjino.ru;

    # ── RevitNavis API ────────────────────────────────────────────────────
    location /api/rvtdoc/ {
        proxy_pass http://127.0.0.1:7401/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # ── Alternative path for FastAPI (without trailing /rvtdoc) ──────────
    location /api/ {
        proxy_pass http://127.0.0.1:7401;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # ── Qdrant vector search API ─────────────────────────────────────────
    location /db/vector/ {
        proxy_pass http://127.0.0.1:6333/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Tree browser UI ──────────────────────────────────────────────────
    location /tree {
        proxy_pass http://127.0.0.1:7401/tree;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static files ─────────────────────────────────────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:7401/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        proxy_pass http://127.0.0.1:7401/health;
        proxy_set_header Host $host;
    }
}
