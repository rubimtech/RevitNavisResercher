# =============================================================================
# RevitNavisResearcher — Remote Server Docker Compose (VPS deployment)
# Runs PostgreSQL + migrated data + FastAPI web app behind Nginx
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: revitnavis-pg
    environment:
      POSTGRES_DB: revitnavis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d revitnavis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web-app:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: revitnavis-web
    ports:
      - "127.0.0.1:7401:7401"
    env_file:
      - .env
    environment:
      - WEB_PORT=7401
      - WEB_HOST=0.0.0.0
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=revitnavis
      - PG_USER=postgres
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
      - LLM_PROVIDER=${LLM_PROVIDER:-routerai}
      - ROUTERAI_BASE_URL=${ROUTERAI_BASE_URL:-https://routerai.ru/api/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-baai/bge-m3}
      - LLM_MODEL=${LLM_MODEL:-deepseek/deepseek-v4-flash}
      - HTTP_TIMEOUT=180
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',7401)); s.close(); exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: revitnavis-migrate
    profiles: ["migrate"]
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=revitnavis
      - PG_USER=postgres
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
    command: >
      sh -c "pip install psycopg2-binary 2>/dev/null && python pg_migrate.py
             --pg-host postgres --pg-port 5432 --pg-db revitnavis
             --pg-user postgres --pg-password ${PG_PASSWORD:-postgres}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pg_data:
