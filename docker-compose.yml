# =============================================================================
# RevitNavisResearcher — Docker Compose
# =============================================================================
services:
  # ── MCP Server (Revit & Navisworks API Research) ──────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revitnavis-mcp
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=routerai
      - ROUTERAI_API_KEY=sk-isRQ7VX-uTljTmWLS_T_Nju8G9-UENh-
      - ROUTERAI_BASE_URL=https://routerai.ru/api/v1
      - EMBEDDING_MODEL=baai/bge-m3
      - LLM_MODEL=deepseek/deepseek-v4-flash
      - QDRANT_URL=http://d9e0f9d73f7a.vps.myjino.ru:6333
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - HTTP_TIMEOUT=180
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',8000)); s.close(); exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Web App (REST API + Frontend) ─────────────────────────────────────────
  web-app:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: revitnavis-web
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER=routerai
      - ROUTERAI_API_KEY=sk-isRQ7VX-uTljTmWLS_T_Nju8G9-UENh-
      - ROUTERAI_BASE_URL=https://routerai.ru/api/v1
      - EMBEDDING_MODEL=baai/bge-m3
      - LLM_MODEL=deepseek/deepseek-v4-flash
      - QDRANT_URL=http://d9e0f9d73f7a.vps.myjino.ru:6333
      - HTTP_TIMEOUT=180
    restart: unless-stopped
