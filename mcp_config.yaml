# =============================================================================
# MCP Server Configuration — RevitNavisResearcher
# =============================================================================
# Этот файл выносит настройки поведения MCP-сервера в YAML.
# Переменные окружения (.env) имеют приоритет над значениями здесь.
# =============================================================================

# ── MCP Transport ───────────────────────────────────────────────────────────
transport:
  mode: sse              # "stdio" — для kilo/CLI, "sse" — для Docker/HTTP
  host: 0.0.0.0
  port: 8000

# ── LLM Provider ────────────────────────────────────────────────────────────
llm:
  provider: "routerai"          # "routerai" | "ollama"
  base_url: "https://routerai.ru/api/v1"
  embedding_model: "baai/bge-m3"
  chat_model: "deepseek/deepseek-v4-flash"
  temperature: 0.3
  max_tokens: 4096

# ── Ollama (локальный LLM, альтернатива RouterAI) ──────────────────────────
# Используется когда llm.provider = "ollama"
ollama:
  base_url: "http://localhost:11434"
  embedding_model: "baai/bge-m3"
  chat_model: "qwen2.5-coder:7b"

# ── Qdrant Vector DB ────────────────────────────────────────────────────────
qdrant:
  url: "https://d9e0f9d73f7a.vps.myjino.ru:6333"
  include_full_code: true     # подтягивать full_code из revit_codebase.db по db_id
  # collections to expose
  collections:
    - name: "revit_api_knowledge"
      description: "Revit API documentation (classes, methods, properties)"
    - name: "Revit_SDK_Samples"
      description: "Revit SDK sample code and examples"
    - name: "navisworks_api_bge"
      description: "Navisworks API documentation"
    - name: "revit_api_whatsnew"
      description: "Revit API What's New changelogs for 2022-2026 (breaking changes, new features, deprecations)"

# ── HTTP Client ─────────────────────────────────────────────────────────────
http_client:
  timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 1.0
  retry_backoff_factor: 2.0

# ── Output ──────────────────────────────────────────────────────────────────
output:
  character_limit: 25000
  truncate_payload: 400
  truncate_syntax: 200

# ── Supported Revit versions ────────────────────────────────────────────────
revit_versions:
  - "2021"
  - "2022"
  - "2023"
  - "2024"
  - "2025"
  - "2026"
  - "2027"

# ── LLM Prompts (system prompts, поддерживают {revit_version} {query} {context} {instructions}) ──
prompts:
  # Для analyze tool
  analyze: >
    You are a Revit API and Navisworks API research assistant.
    Analyze the provided search results and answer the user's question.
    Provide specific code examples, API references, and version compatibility notes.
  # Для research tool (MCP)
  research: >
    You are a Revit API expert. Answer the question based on the provided search results.
    Target Revit version: {revit_version}.

    CRITICAL INSTRUCTIONS FOR CROSS-VERSION ANALYSIS:
    1. The search results include "revit_api_knowledge" and "Revit_SDK_Samples" entries FILTERED for the target version ({revit_version}).
    2. The "What's New (changelog)" section shows changes introduced in versions 2022, 2023, 2024, 2025, 2026 — use this to trace the API evolution leading up to {revit_version}.
    3. Compare the current target version data with the changelog history to identify:
       - When the relevant API was introduced/changed/deprecated
       - Breaking changes between versions
       - Migration paths from older versions to {revit_version}
    4. The "Cross-Version API Availability" section shows which APIs exist in which versions — use this to verify version compatibility.
    5. If an API exists in {revit_version} but not in earlier versions, note the version it was introduced in and suggest alternatives for older versions.
    6. Provide code examples relevant to {revit_version} and, where applicable, show migration patterns from older API usage.
    7. If the user asks about an older version, use the whatsnew and cross-version data to explain what changed between their version and {revit_version}.
  # Для /api/research (Web)
  web_research: >
    You are a Revit API, Revit SDK, and Navisworks API expert.
    Answer the question based on the search results. Target Revit version: {revit_version}.
    Provide code examples where relevant.

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level: "INFO"         # DEBUG | INFO | WARNING | ERROR
  format: "json"        # "json" or "text"
